name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Ubuntu system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      # ⚠️ NUNCA regenerar TAURI_SIGNING_PRIVATE_KEY ni cambiar la pubkey de
      # src-tauri/tauri.conf.json sin coordinar un aviso a usuarios. La pubkey
      # se compila DENTRO del binario en build-time y no se puede actualizar
      # remotamente: rotar la clave orfana el auto-update de TODO lo que ya
      # esté instalado. Incidente real: entre 2026-06-16 y 2026-06-23 la pubkey
      # de tauri.conf.json quedó con bytes distintos a la clave privada real de
      # este secret (el comentario de texto mentía sobre el key_id real),
      # rompiendo el auto-update para todas las versiones v0.2.2-v0.2.6.
      # Antes de tocar este secret o la pubkey: verificar con un round-trip
      # (firmar un archivo con la clave nueva y comparar el key_id real de la
      # firma contra el key_id real de la pubkey nueva, byte a byte — NO
      # confiar en el comentario de texto del archivo .pub).
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: app-v__VERSION__
          releaseName: 'Bako v__VERSION__'
          releaseBody: '## Install instructions

### macOS
The app is unsigned (no Apple Developer certificate). When you open it for the first time, macOS will show "Bako is damaged and can''t be opened". To fix:

**Option A — Terminal (recommended):**
```bash
xattr -cr /Applications/Bako.app
```

**Option B — Right-click open:**
Right-click Bako.app → "Open" → confirm the dialog.

After that, Bako will open normally.

### Linux
Make the AppImage executable:
```bash
chmod +x Bako_*.AppImage
./Bako_*.AppImage
```

### Windows
Run the .exe installer. If SmartScreen warns, click "More info" → "Run anyway".'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
